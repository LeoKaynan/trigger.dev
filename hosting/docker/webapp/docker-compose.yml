version: "3.9"

services:
  webapp:
    image: ghcr.io/triggerdotdev/trigger.dev:${TRIGGER_IMAGE_TAG:-v4-beta}
    volumes:
      - shared:/home/node/shared
    networks:
      - webapp
      - supervisor
      - traefik
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.webapp.rule=Host(`trigger.triggerdev-webapp-aevzrz-6d538d-4-155-36-74.traefik.me`)"
        - "traefik.http.routers.webapp.entrypoints=web"
        - "traefik.http.services.webapp.loadbalancer.server.port=3000"
    environment:
      APP_ORIGIN: ${APP_ORIGIN:-https://triggerdev-webapp-aevzrz-6d538d-4-155-36-74.traefik.me}
      LOGIN_ORIGIN: ${LOGIN_ORIGIN:-https://triggerdev-webapp-aevzrz-6d538d-4-155-36-74.traefik.me}
      API_ORIGIN: ${API_ORIGIN:-https://triggerdev-webapp-aevzrz-6d538d-4-155-36-74.traefik.me}
      ELECTRIC_ORIGIN: http://electric:3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/main?schema=public&sslmode=disable}
      DIRECT_URL: ${DIRECT_URL:-postgresql://postgres:postgres@postgres:5432/main?schema=public&sslmode=disable}
      SESSION_SECRET: ${SESSION_SECRET}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MANAGED_WORKER_SECRET: ${MANAGED_WORKER_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TLS_DISABLED: true
      APP_LOG_LEVEL: info
      TRIGGER_BOOTSTRAP_ENABLED: 1
      TRIGGER_BOOTSTRAP_WORKER_GROUP_NAME: bootstrap
      TRIGGER_BOOTSTRAP_WORKER_TOKEN_PATH: /home/node/shared/worker_token
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-http://default:password@clickhouse:8123?secure=false}
      RUN_REPLICATION_ENABLED: 1
      RUN_REPLICATION_CLICKHOUSE_URL: ${RUN_REPLICATION_CLICKHOUSE_URL:-http://default:password@clickhouse:8123}
      RUN_REPLICATION_LOG_LEVEL: info

  postgres:
    image: postgres:14
    volumes:
      - postgres:/var/lib/postgresql/data/
    networks:
      - webapp
    deploy:
      placement:
        constraints:
          - node.role == manager

  redis:
    image: redis:7
    volumes:
      - redis:/data
    networks:
      - webapp
    deploy:
      placement:
        constraints:
          - node.role == manager

  clickhouse:
    image: bitnami/clickhouse:latest
    volumes:
      - clickhouse:/bitnami/clickhouse
    networks:
      - webapp
    deploy:
      placement:
        constraints:
          - node.role == manager

  electric:
    image: electricsql/electric:1.0.24
    networks:
      - webapp
    deploy:
      placement:
        constraints:
          - node.role == manager

  minio:
    image: bitnami/minio:latest
    volumes:
      - minio:/bitnami/minio/data
    networks:
      - webapp
      - traefik
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.minio.rule=Host(`minio.triggerdev-webapp-aevzrz-6d538d-4-155-36-74.traefik.me`)"
        - "traefik.http.routers.minio.entrypoints=web"
        - "traefik.http.services.minio.loadbalancer.server.port=9000"

  registry:
    image: registry:2
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - webapp
      - traefik
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.registry.rule=Host(`registry.triggerdev-webapp-aevzrz-6d538d-4-155-36-74.traefik.me`)"
        - "traefik.http.routers.registry.entrypoints=web"
        - "traefik.http.services.registry.loadbalancer.server.port=5000"

volumes:
  postgres:
  redis:
  clickhouse:
  minio:
  registry-data:
  shared:

networks:
  webapp:
  supervisor:
    external: true
  traefik:
    external: true
